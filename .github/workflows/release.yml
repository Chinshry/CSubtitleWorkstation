name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.5'
        required: true
        type: string
      overwrite:
        description: 'Delete the existing GitHub Release/tag and rebuild this version'
        required: false
        default: false
        type: boolean
      notes:
        description: 'Confirmed Markdown release notes used by both GitHub Release and latest.json'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
      release_id: ${{ steps.draft.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version, changelog, and update files
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_OVERWRITE: ${{ inputs.overwrite }}
          INPUT_NOTES: ${{ inputs.notes }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            VERSION="${TAG#v}"
            SHA="$(git rev-parse HEAD)"
            TO_REF="$TAG"
          else
            VERSION="${INPUT_VERSION#v}"
            if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$'; then
              echo "Invalid version: $INPUT_VERSION"
              echo "Use a version like 0.1.5"
              exit 1
            fi

            TAG="v$VERSION"
            TO_REF="HEAD"
            OVERWRITE="${INPUT_OVERWRITE:-false}"

            RELEASE_EXISTS=false
            TAG_EXISTS=false
            if gh release view "$TAG" >/dev/null 2>&1; then
              RELEASE_EXISTS=true
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              TAG_EXISTS=true
            fi

            RELEASE_IS_DRAFT=false
            if [ "$RELEASE_EXISTS" = "true" ]; then
              if gh release view "$TAG" --json isDraft --jq '.isDraft' | grep -qi true; then
                RELEASE_IS_DRAFT=true
              fi
            fi

            if [ "$OVERWRITE" != "true" ]; then
              if [ "$TAG_EXISTS" = "true" ]; then
                echo "Tag $TAG already exists. Re-run with overwrite=true to rebuild."
                exit 1
              fi
              if [ "$RELEASE_EXISTS" = "true" ] && [ "$RELEASE_IS_DRAFT" != "true" ]; then
                echo "Release $TAG is already published. Re-run with overwrite=true to rebuild."
                exit 1
              fi
            fi

            if [ "$OVERWRITE" = "true" ]; then
              if [ "$RELEASE_EXISTS" = "true" ]; then
                gh release delete "$TAG" --yes --cleanup-tag
              elif [ "$TAG_EXISTS" = "true" ]; then
                git push origin ":refs/tags/$TAG"
              fi
              git tag -d "$TAG" >/dev/null 2>&1 || true
            fi
          fi

          python .agents/release/scripts/generate_changelog.py \
            --repo . \
            --version "$VERSION" \
            --to-ref "$TO_REF" > RELEASE_CHANGELOG.md

          if [ -n "${INPUT_NOTES:-}" ]; then
            printf '%s\n' "$INPUT_NOTES" > RELEASE_NOTES.md
          else
            cp RELEASE_CHANGELOG.md RELEASE_NOTES.md
          fi
          APP_NOTES="$(cat RELEASE_NOTES.md)"

          if [ "$EVENT_NAME" != "push" ]; then
            export VERSION
            export APP_NOTES
            export TAG

            node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            const tag = `v${version}`;
            const appNotes = process.env.APP_NOTES;
            const manifestNotes = appNotes
              .replace(/\r\n/g, "\n")
              .replace(/\n{3,}/g, "\n\n")
              .trim();

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");

            const cargoPath = "src-tauri/Cargo.toml";
            let cargo = fs.readFileSync(cargoPath, "utf8");
            cargo = cargo.replace(/^version = ".*"$/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, cargo);

            const manifestPath = "docs/updates/latest.json";
            const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
            manifest.version = version;
            manifest.notes = manifestNotes;
            manifest.pub_date = new Date().toISOString();
            manifest.platforms = {
              "windows-x86_64": {
                url: `https://github.com/Chinshry/CSubtitleWorkstation/releases/download/${tag}/CSubtitleWorkstation_${version}_x64-setup.exe`
              },
              "darwin-universal": {
                url: `https://github.com/Chinshry/CSubtitleWorkstation/releases/download/${tag}/CSubtitleWorkstation_${version}_universal.dmg`
              }
            };
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + "\n");
            '

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/Cargo.toml docs/updates/latest.json

            if git diff --cached --quiet; then
              echo "Version files already contain $VERSION"
            else
              git commit -m "chore: release $TAG"
              git push origin HEAD:refs/heads/${{ github.ref_name }}
            fi
          fi

          SHA="$(git rev-parse HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          {
            echo 'release_notes<<RELEASE_NOTES_EOF'
            cat RELEASE_NOTES.md
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"
          {
            echo 'app_notes<<APP_NOTES_EOF'
            printf '%s\n' "$APP_NOTES"
            echo 'APP_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        id: draft
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ steps.meta.outputs.sha }}
          RELEASE_NOTES: ${{ steps.meta.outputs.release_notes }}
        with:
          script: |
            const tag = process.env.TAG;
            const sha = process.env.SHA;
            const releaseNotes = process.env.RELEASE_NOTES || '请查看本次提交记录。';
            const body = [
              '## 安装',
              '',
              '- **Windows**：下载 `*-setup.exe` 安装包，双击运行。',
              '- **macOS**：下载 `*_universal.dmg`，兼容 Apple Silicon 和 Intel Mac。',
              '',
              '> macOS 版本不支持 AVS 压制路线（仅 Windows）。',
              '> macOS 首次打开如提示“无法验证开发者”，请右键应用 -> 打开。',
              '',
              '---',
              releaseNotes,
            ].join('\n');

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: data.id,
                name: `CC 字幕压制工作站 ${tag}`,
                target_commitish: sha,
                body,
                draft: true,
                prerelease: false,
              });
              core.setOutput('release_id', String(data.id));
              core.info(`Updated existing release id=${data.id}`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `CC 字幕压制工作站 ${tag}`,
              target_commitish: sha,
              body,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', String(data.id));
            core.info(`Created draft release id=${data.id}`);

  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 'windows-x64'
            platform: 'windows-latest'
            args: ''
          - label: 'macos-universal'
            platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on remote, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$SHA"
            git push origin "$TAG"
          fi

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false

      - name: Sync update manifest publish date
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          PUBLISHED_AT="$(gh release view "$TAG" --json publishedAt --jq '.publishedAt')"
          if [ -z "$PUBLISHED_AT" ] || [ "$PUBLISHED_AT" = "null" ]; then
            echo "Release $TAG does not have publishedAt yet"
            exit 1
          fi

          export PUBLISHED_AT
          node -e '
          const fs = require("fs");
          const manifestPath = "docs/updates/latest.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.pub_date = process.env.PUBLISHED_AT;
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + "\n");
          '

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/updates/latest.json

          if git diff --cached --quiet; then
            echo "Update manifest already contains release publish date"
          else
            git commit -m "chore: sync release publish date"
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          fi
