name: Release

# 触发条件：
#   1. 推送 v* 形如 v0.1.0 的 tag
#   2. 仓库 Actions 页面手动 dispatch（用于在不发版的情况下试跑流水线）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# tauri-action 需要 contents:write 才能创建 Release 与上传 assets
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      # 单平台失败不打断其他平台
      fail-fast: false
      matrix:
        include:
          # Windows: 仅出 NSIS 安装包，配合 tauri.windows.conf.json
          - label: 'windows-x64'
            platform: 'windows-latest'
            args: ''
          # macOS Apple Silicon (M1/M2/...) 原生构建
          - label: 'macos-arm64'
            platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # macOS Intel：macos-13 仍是 x86_64 runner（macos-latest 已切换到 arm64）
          - label: 'macos-x86_64'
            platform: 'macos-13'
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 矩阵需要追加目标 triple；Windows 用 host 默认即可
          targets: ${{ startsWith(matrix.platform, 'macos') && (matrix.label == 'macos-arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # 不同矩阵的 target 不一样，缓存按 label 分桶避免互相污染
          key: ${{ matrix.label }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 推 tag 触发时用 tag 名；手动 dispatch 时 ref_name 是分支名（不会建 release，仅试构建产物）
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'CC 字幕压制工作站 ${{ github.ref_name }}'
          releaseBody: |
            ## 安装

            - **Windows**：下载 `*-setup.exe` 安装包，双击运行。
            - **macOS Apple Silicon (M 系列)**：下载 `*_aarch64.dmg`。
            - **macOS Intel**：下载 `*_x64.dmg`。

            > macOS 版本不支持 AVS 压制路线（仅 Windows）。

            ---
            完整变更见提交历史。
          # 草稿模式：流水线只填充 assets，正式发布由你在 GitHub 页面点 Publish
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
