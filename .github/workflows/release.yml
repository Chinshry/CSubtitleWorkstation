name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.1'
        required: true
        type: string
      overwrite:
        description: 'Delete the existing GitHub Release/tag and rebuild this version'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version and tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_OVERWRITE: ${{ inputs.overwrite }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            VERSION="${TAG#v}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$INPUT_VERSION"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: $VERSION"
            echo "Use a version like 0.1.1"
            exit 1
          fi

          TAG="v$VERSION"
          OVERWRITE="${INPUT_OVERWRITE:-false}"

          RELEASE_EXISTS=false
          TAG_EXISTS=false

          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi

          if [ "$OVERWRITE" != "true" ] && { [ "$RELEASE_EXISTS" = "true" ] || [ "$TAG_EXISTS" = "true" ]; }; then
            echo "$TAG already exists. Re-run with overwrite=true to rebuild this version."
            exit 1
          fi

          if [ "$OVERWRITE" = "true" ]; then
            if [ "$RELEASE_EXISTS" = "true" ]; then
              gh release delete "$TAG" --yes --cleanup-tag
            elif [ "$TAG_EXISTS" = "true" ]; then
              git push origin ":refs/tags/$TAG"
            fi
          fi

          node -e "
            const fs = require('fs');
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = process.env.INPUT_VERSION;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

            const cargoPath = 'src-tauri/Cargo.toml';
            let cargo = fs.readFileSync(cargoPath, 'utf8');
            cargo = cargo.replace(/^version = \".*\"$/m, 'version = \"' + process.env.INPUT_VERSION + '\"');
            fs.writeFileSync(cargoPath, cargo);
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml

          if git diff --cached --quiet; then
            echo "Version files already contain $VERSION"
          else
            git commit -m "chore: release $TAG"
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          fi

          git tag "$TAG"
          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 'windows-x64'
            platform: 'windows-latest'
            args: ''
          - label: 'macos-universal'
            platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'CC 字幕压制工作站 ${{ needs.prepare.outputs.tag }}'
          releaseBody: |
            ## 安装

            - **Windows**：下载 `*-setup.exe` 安装包，双击运行。
            - **macOS**：下载 `*_universal.dmg`，兼容 Apple Silicon 和 Intel Mac。

            > macOS 版本不支持 AVS 压制路线（仅 Windows）。
            > macOS 首次打开如提示“无法验证开发者”，请右键应用 -> 打开。

            ---
            完整变更见提交历史。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
